name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run Worker tests
        run: node --test cloudflare/test/lang-redirect.test.js
